<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Снаряжение Солдата</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap');

:root {
–bg: #1a1c14;
–panel: #23271a;
–border: #3a4028;
–accent: #8a9a3c;
–accent2: #c8a227;
–text: #d4d9b8;
–muted: #6b7355;
–highlight: #b5c44a;
}

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Raleway’, sans-serif;
min-height: 100vh;
display: flex;
flex-direction: column;
overflow-x: hidden;
}

/* BG texture */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image:
repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(138,154,60,0.04) 39px, rgba(138,154,60,0.04) 40px),
repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(138,154,60,0.04) 39px, rgba(138,154,60,0.04) 40px);
pointer-events: none;
z-index: 0;
}

header {
position: relative;
z-index: 10;
padding: 18px 40px;
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
gap: 16px;
background: rgba(26,28,20,0.95);
backdrop-filter: blur(8px);
}

.star { color: var(–accent2); font-size: 20px; }
header h1 {
font-family: ‘Oswald’, sans-serif;
font-size: 22px;
font-weight: 700;
letter-spacing: 4px;
text-transform: uppercase;
color: var(–text);
}
header span {
font-size: 11px;
letter-spacing: 3px;
color: var(–muted);
text-transform: uppercase;
margin-left: auto;
}

.main {
position: relative;
z-index: 1;
flex: 1;
display: flex;
gap: 0;
min-height: calc(100vh - 62px);
}

/* LEFT PANEL - gear slots */
.gear-panel {
width: 280px;
min-width: 260px;
border-right: 1px solid var(–border);
padding: 28px 20px;
display: flex;
flex-direction: column;
gap: 20px;
background: rgba(35,39,26,0.6);
}

.gear-panel h2 {
font-family: ‘Oswald’, sans-serif;
font-size: 13px;
letter-spacing: 4px;
color: var(–muted);
text-transform: uppercase;
padding-bottom: 8px;
border-bottom: 1px solid var(–border);
}

.slot-group { display: flex; flex-direction: column; gap: 10px; }
.slot-label {
font-size: 10px;
letter-spacing: 3px;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 4px;
}

.gear-options {
display: flex;
gap: 8px;
flex-wrap: wrap;
}

.gear-btn {
position: relative;
width: 74px;
height: 74px;
border: 1.5px solid var(–border);
border-radius: 6px;
background: var(–panel);
cursor: pointer;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 4px;
transition: border-color 0.2s, background 0.2s, transform 0.15s;
overflow: hidden;
padding: 6px;
}

.gear-btn:hover {
border-color: var(–accent);
background: #2d3420;
transform: translateY(-2px);
}

.gear-btn.active {
border-color: var(–highlight);
background: #2a3018;
box-shadow: 0 0 12px rgba(181,196,74,0.2);
}

.gear-btn svg { width: 38px; height: 38px; }
.gear-btn span {
font-size: 9px;
letter-spacing: 1px;
color: var(–muted);
text-align: center;
text-transform: uppercase;
}
.gear-btn.active span { color: var(–highlight); }

.gear-btn .check {
position: absolute;
top: 4px; right: 4px;
width: 12px; height: 12px;
background: var(–highlight);
border-radius: 50%;
display: none;
align-items: center;
justify-content: center;
font-size: 8px;
color: #1a1c14;
}
.gear-btn.active .check { display: flex; }

/* CENTER - soldier */
.soldier-area {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 40px 20px;
position: relative;
}

.soldier-stage {
position: relative;
width: 340px;
height: 560px;
}

.soldier-stage svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

.layer {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
opacity: 0;
transition: opacity 0.35s ease;
pointer-events: none;
}
.layer.visible { opacity: 1; }

/* ground shadow */
.soldier-shadow {
position: absolute;
bottom: -12px;
left: 50%;
transform: translateX(-50%);
width: 120px;
height: 20px;
background: radial-gradient(ellipse, rgba(0,0,0,0.5) 0%, transparent 70%);
}

.gear-name {
position: absolute;
bottom: -50px;
left: 50%;
transform: translateX(-50%);
font-family: ‘Oswald’, sans-serif;
font-size: 13px;
letter-spacing: 4px;
color: var(–accent);
text-transform: uppercase;
white-space: nowrap;
opacity: 0;
transition: opacity 0.3s;
}
.gear-name.show { opacity: 1; }

/* RIGHT info panel */
.info-panel {
width: 220px;
min-width: 200px;
border-left: 1px solid var(–border);
padding: 28px 18px;
background: rgba(35,39,26,0.6);
display: flex;
flex-direction: column;
gap: 18px;
}

.info-panel h2 {
font-family: ‘Oswald’, sans-serif;
font-size: 13px;
letter-spacing: 4px;
color: var(–muted);
text-transform: uppercase;
padding-bottom: 8px;
border-bottom: 1px solid var(–border);
}

.stat-row {
display: flex;
flex-direction: column;
gap: 4px;
}
.stat-name {
font-size: 9px;
letter-spacing: 2px;
color: var(–muted);
text-transform: uppercase;
}
.stat-bar-wrap {
height: 4px;
background: var(–border);
border-radius: 2px;
overflow: hidden;
}
.stat-bar {
height: 100%;
background: var(–accent);
border-radius: 2px;
transition: width 0.5s ease;
}
.stat-val {
font-family: ‘Oswald’, sans-serif;
font-size: 11px;
color: var(–text);
text-align: right;
margin-top: 2px;
}

.equipped-list {
display: flex;
flex-direction: column;
gap: 6px;
}
.eq-item {
font-size: 11px;
color: var(–text);
display: flex;
align-items: center;
gap: 8px;
padding: 6px 8px;
background: rgba(138,154,60,0.08);
border-radius: 4px;
border-left: 2px solid var(–accent);
transition: all 0.3s;
}
.eq-item.empty {
color: var(–muted);
border-left-color: var(–border);
background: transparent;
}
.eq-dot {
width: 6px; height: 6px;
border-radius: 50%;
background: var(–accent);
flex-shrink: 0;
}
.eq-item.empty .eq-dot { background: var(–border); }

.reset-btn {
margin-top: auto;
padding: 10px;
background: transparent;
border: 1px solid var(–border);
color: var(–muted);
font-family: ‘Oswald’, sans-serif;
font-size: 12px;
letter-spacing: 3px;
text-transform: uppercase;
cursor: pointer;
border-radius: 4px;
transition: all 0.2s;
}
.reset-btn:hover {
border-color: var(–accent2);
color: var(–accent2);
}

/* ANIMATIONS */
@keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: none; } }
.soldier-stage { animation: fadeIn 0.6s ease; }

</style>
</head>

<script>
const state = { helmet: 'none', vest: 'none', pants: 'none', boots: 'none' };

const names = {
helmet: { none: 'Шлем: не надет', ssh68: 'Шлем: СШ-68', ratnik: 'Шлем: Ратник' },
vest: { none: 'Броник: не надет', '6b2': 'Броник: 6Б2', '6b45': 'Броник: 6Б45' },
pants: { none: 'Брюки: по умолчанию', camo: 'Брюки: Камуфляж', digital: 'Брюки: Цифра' },
boots: { none: 'Обувь: базовая', kirza: 'Обувь: Кирзачи', tactical: 'Обувь: Тактические' }
};

const showNames = {
helmet: { none: '', ssh68: 'СШ-68', ratnik: 'Шлем Ратник' },
vest: { none: '', '6b2': 'Бронежилет 6Б2', '6b45': 'Бронежилет 6Б45' },
pants: { none: '', camo: 'Камуфляж Лесной', digital: 'Цифровой Камуфляж' },
boots: { none: '', kirza: 'Кирзовые Сапоги', tactical: 'Тактические Берцы' }
};

// Stats weights
const statWeights = {
defense: {
helmet: { none:0, ssh68:10, ratnik:20 },
vest: { none:0, '6b2':20, '6b45':35 },
pants: { none:0, camo:5, digital:5 },
boots: { none:0, kirza:3, tactical:7 }
},
mobility: {
helmet: { none:0, ssh68:-3, ratnik:-8 },
vest: { none:0, '6b2':-8, '6b45':-18 },
pants: { none:0, camo:-2, digital:-3 },
boots: { none:0, kirza:-3, tactical:-5 }
},
stealth: {
helmet: { none:0, ssh68:5, ratnik:8 },
vest: { none:0, '6b2':8, '6b45':12 },
pants: { none:0, camo:15, digital:10 },
boots: { none:0, kirza:-2, tactical:5 }
}
};

function selectGear(btn) {
const slot = btn.dataset.slot;
const val = btn.dataset.val;

// update buttons
document.querySelectorAll(`[data-slot="${slot}"]`).forEach(b => b.classList.remove('active'));
btn.classList.add('active');

// hide old layer
const oldLayer = document.getElementById(`${slot}-${state[slot]}`);
if (oldLayer) oldLayer.classList.remove('visible');

state[slot] = val;

// show new layer
const newLayer = document.getElementById(`${slot}-${val}`);
if (newLayer) newLayer.classList.add('visible');

// update equipped list
const eq = document.getElementById(`eq-${slot}`);
eq.querySelector('span').textContent = names[slot][val];
if (val === 'none') eq.classList.add('empty');
else eq.classList.remove('empty');

// show name popup
const gn = document.getElementById('gear-name');
const sn = showNames[slot][val];
if (sn) {
gn.textContent = sn;
gn.classList.add('show');
setTimeout(() => gn.classList.remove('show'), 2000);
}

updateStats();
}

function updateStats() {
const base = { defense: 20, mobility: 90, stealth: 50 };
['defense','mobility','stealth'].forEach(stat => {
let total = base[stat];
['helmet','vest','pants','boots'].forEach(slot => {
total += statWeights[stat][slot][state[slot]];
});
total = Math.max(0, Math.min(100, total));
document.getElementById(`stat-${stat}`).style.width = total + '%';
document.getElementById(`val-${stat}`).textContent = total + '%';
});
}

function resetAll() {
['helmet','vest','pants','boots'].forEach(slot => {
const noneBtn = document.querySelector(`[data-slot="${slot}"][data-val="none"]`);
if (noneBtn) selectGear(noneBtn);
});
}
</script>
